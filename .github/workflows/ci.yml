name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/engine/package-lock.json

      - name: Install engine deps
        working-directory: packages/engine
        run: npm ci --no-workspaces

      - name: Typecheck
        working-directory: packages/engine
        run: npm run typecheck

      - name: Test
        working-directory: packages/engine
        run: npm test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        working-directory: apps/web
        run: npm ci --no-workspaces

      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Test
        working-directory: apps/web
        run: npm test

      - name: Build
        working-directory: apps/web
        run: npm run build

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check services/api/ || true
      - run: ruff format --check services/api/ || true
